# Personal Hyprland overrides — managed by chezmoi
# Sourced LAST in hyprland.conf so these settings win over dots-hyprland defaults.
# Uncomment and edit as needed.

# ── Monitors ────────────────────────────────────────────────────────
# NOTE: Monitor names are machine-specific. Run `hyprctl monitors` to find yours.
# DP-1: ~27" 1080p 144Hz (primary, left)
# HDMI-A-1: ~24" 1080p 60Hz (right)
monitor = DP-1, 1920x1080@144, 0x0, 1
monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1

