---
# ── KVM / QEMU / virt-manager ────────────────────────────────────

- name: Install KVM and Virtualization Tools
  community.general.pacman:
    name:
      - qemu-full
      - libvirt
      - virt-manager
      - virt-viewer
      - dnsmasq
      - edk2-ovmf
      - swtpm
      - bridge-utils
      - iptables-nft
      - openbsd-netcat
      - dmidecode
    state: present
  become: yes

- name: Start and Enable libvirtd service
  ansible.builtin.systemd_service:
    name: libvirtd
    state: started
    enabled: true
  become: yes

- name: Enable virtlogd socket
  ansible.builtin.systemd_service:
    name: virtlogd.socket
    state: started
    enabled: true
  become: yes

- name: Add user to libvirt and kvm groups
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: libvirt,kvm
    append: yes
  become: yes

# ── Polkit rule for passwordless virt-manager ────────────────────

- name: Allow libvirt group passwordless virt-manager access
  ansible.builtin.copy:
    content: |
      polkit.addRule(function(action, subject) {
          if (action.id == "org.libvirt.unix.manage" &&
              subject.isInGroup("libvirt")) {
              return polkit.Result.YES;
          }
      });
    dest: /etc/polkit-1/rules.d/50-libvirt.rules
    mode: "0644"
  become: yes

# ── Default NAT network ─────────────────────────────────────────

- name: Check if default network exists
  ansible.builtin.command: virsh net-info default
  register: virsh_net_check
  failed_when: false
  changed_when: false
  become: yes

- name: Start and autostart default NAT network
  ansible.builtin.shell: |
    virsh net-start default 2>/dev/null || true
    virsh net-autostart default
  when: virsh_net_check.rc == 0
  become: yes

- name: Define and start default NAT network
  ansible.builtin.shell: |
    virsh net-define /usr/share/libvirt/networks/default.xml
    virsh net-start default
    virsh net-autostart default
  when: virsh_net_check.rc != 0
  become: yes

# ── Default storage pool ────────────────────────────────────────

- name: Check if default storage pool exists
  ansible.builtin.command: virsh pool-info default
  register: virsh_pool_check
  failed_when: false
  changed_when: false
  become: yes

- name: Create and start default storage pool
  ansible.builtin.shell: |
    virsh pool-define-as default dir --target /var/lib/libvirt/images
    virsh pool-build default
    virsh pool-start default
    virsh pool-autostart default
  when: virsh_pool_check.rc != 0
  become: yes

- name: Autostart existing default storage pool
  ansible.builtin.command: virsh pool-autostart default
  when: virsh_pool_check.rc == 0
  changed_when: false
  become: yes

# ── Nested virtualization ───────────────────────────────────────

- name: Enable nested virtualization (Intel)
  ansible.builtin.copy:
    content: "options kvm_intel nested=1\n"
    dest: /etc/modprobe.d/kvm-nested.conf
    mode: "0644"
  become: yes

# ── Docker ────────────────────────────────────────────────────────

- name: Install Docker and Compose
  community.general.pacman:
    name:
      - docker
      - docker-compose
      - docker-buildx
    state: present
  become: yes

- name: Enable and start Docker service
  ansible.builtin.systemd_service:
    name: docker
    enabled: yes
    state: started
  become: yes

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: docker
    append: yes
  become: yes

# ── Podman ────────────────────────────────────────────────────────

- name: Install Podman and Podman Compose
  community.general.pacman:
    name:
      - podman
      - podman-compose
    state: present
  become: yes

- name: Install Podman Desktop (Flatpak)
  community.general.flatpak:
    name: io.podman_desktop.PodmanDesktop
    remote: flathub
    state: present

# ── Winboat ──────────────────────────────────────────────────────

- name: Install Winboat
  kewlfft.aur.aur:
    name: winboat
    state: present
  become: no

# ── Remote desktop ───────────────────────────────────────────────

- name: Install FreeRDP
  community.general.pacman:
    name: freerdp
    state: present
  become: yes
