---
# ── Google Chrome ───────────────────────────────────────────────
- name: Install Google Chrome
  kewlfft.aur.aur:
    name: google-chrome
    state: present
  become: no

# ── Zen Browser ─────────────────────────────────────────────────

- name: Install Zen Browser
  kewlfft.aur.aur:
    name: zen-browser-bin
    state: present
  become: no

# ── Spotify ───────────────────────────────────────────────────────

- name: Install Spotify
  community.general.pacman:
    name: spotify-launcher
    state: present
  become: yes

# ── Draw.io ──────────────────────────────────────────────────────

- name: Install draw.io desktop
  kewlfft.aur.aur:
    name: drawio-desktop-bin
    state: present
  become: no

# ── VLC ──────────────────────────────────────────────────────────
- name: Install VLC
  community.general.pacman:
    name: vlc
    state: present
  become: yes

# ── qBittorrent ────────────────────────────────────────────────
- name: Install qBittorrent
  community.general.pacman:
    name: qbittorrent
    state: present
  become: yes

# ── Visual Studio Code ───────────────────────────────────────────

- name: Install Visual Studio Code
  kewlfft.aur.aur:
    name: visual-studio-code-bin
    state: present
  become: no

# ── KATE Text Editor ─────────────────────────────────────────────

- name: Install KATE text editor
  community.general.pacman:
    name: kate
    state: present
  become: yes

# ── Stremio ──────────────────────────────────────────────────────

- name: Ensure Flatpak is installed
  community.general.pacman:
    name: flatpak
    state: present
  become: yes

- name: Add Flathub remote
  community.general.flatpak_remote:
    name: flathub
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
    state: present

- name: Install Stremio (Flatpak)
  community.general.flatpak:
    name: com.stremio.Stremio
    remote: flathub
    state: present

# ── Electron 33 ────────────────────────────────────────────────

- name: Install Electron 33
  kewlfft.aur.aur:
    name: electron33-bin
    state: present
  become: no

# ── JRE OpenJDK ────────────────────────────────────────────────

- name: Install JRE OpenJDK (headless)
  community.general.pacman:
    name: jre-openjdk-headless
    state: present
  become: yes

# ── Android Tools / scrcpy ───────────────────────────────────────

- name: Install android-tools and scrcpy
  community.general.pacman:
    name:
      - android-tools
      - scrcpy
    state: present
  become: yes

# ── Escrcpy ────────────────────────────────────────────────────

- name: Install Escrcpy
  kewlfft.aur.aur:
    name: escrcpy-bin
    state: present
  become: no

# ── Podman Desktop ────────────────────────────────────────────

- name: Install Podman
  community.general.pacman:
    name: podman
    state: present
  become: yes

- name: Install Podman Desktop (Flatpak)
  community.general.flatpak:
    name: io.podman_desktop.PodmanDesktop
    remote: flathub
    state: present

# ── Docker ────────────────────────────────────────────────────

- name: Install Docker and Compose
  community.general.pacman:
    name:
      - docker
      - docker-compose
      - docker-buildx
    state: present
  become: yes

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started
  become: yes

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: yes
  become: yes

# ── EasyEffects ────────────────────────────────────────────────

- name: Install EasyEffects
  community.general.pacman:
    name: easyeffects
    state: present
  become: yes

# ── Arduino IDE ────────────────────────────────────────────────
- name: Install Arduino IDE
  kewlfft.aur.aur:
    name: arduino-ide-bin
    state: present
  become: no

# ── PlatformIO ────────────────────────────────────────────────
- name: Install PlatformIO Core (udev rules)
  community.general.pacman:
    name: platformio-core-udev
    state: present
  become: yes

- name: Install PlatformIO IDE (VS Code extension)
  ansible.builtin.command:
    cmd: code --install-extension platformio.platformio-ide
  become: no
  changed_when: false
