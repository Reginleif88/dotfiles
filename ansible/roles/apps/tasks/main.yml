---
# ── Google Chrome ───────────────────────────────────────────────
- name: Install Google Chrome
  kewlfft.aur.aur:
    name: google-chrome
    state: present
  become: no

# ── Zen Browser ─────────────────────────────────────────────────

- name: Install Zen Browser
  kewlfft.aur.aur:
    name: zen-browser-bin
    state: present
  become: no

# ── Spotify ───────────────────────────────────────────────────────

- name: Install Spotify
  community.general.pacman:
    name: spotify-launcher
    state: present
  become: yes

# ── Draw.io ──────────────────────────────────────────────────────

- name: Install draw.io desktop
  kewlfft.aur.aur:
    name: drawio-desktop-bin
    state: present
  become: no

# ── VLC ──────────────────────────────────────────────────────────
- name: Install VLC
  community.general.pacman:
    name: vlc
    state: present
  become: yes

# ── qBittorrent ────────────────────────────────────────────────
- name: Install qBittorrent
  community.general.pacman:
    name: qbittorrent
    state: present
  become: yes

# ── Visual Studio Code ───────────────────────────────────────────

- name: Install Visual Studio Code
  kewlfft.aur.aur:
    name: visual-studio-code-bin
    state: present
  become: no

# ── KATE Text Editor ─────────────────────────────────────────────

- name: Install KATE text editor
  community.general.pacman:
    name: kate
    state: present
  become: yes

# ── Stremio ──────────────────────────────────────────────────────

- name: Ensure Flatpak is installed
  community.general.pacman:
    name: flatpak
    state: present
  become: yes

- name: Add Flathub remote
  community.general.flatpak_remote:
    name: flathub
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
    state: present

- name: Install Stremio (Flatpak)
  community.general.flatpak:
    name: com.stremio.Stremio
    remote: flathub
    state: present
