---
# NVIDIA — driver setup and power management

# ── Driver install ────────────────────────────────────────────────
# Let CachyOS chwd handle driver packages, modules, and modprobe.
# chwd auto-detects GPU and installs correct driver (prebuilt or DKMS),
# configures early KMS in /etc/mkinitcpio.d/10-chwd.conf,
# and sets nvidia_drm modeset=1 + fbdev=1 via /usr/lib/modprobe.d/nvidia.conf
- name: Install NVIDIA drivers via chwd (auto-detect)
  ansible.builtin.command: chwd -a
  register: chwd_result
  changed_when: "'installed' in chwd_result.stdout"
  become: yes

# ── Suspend / Hibernate ──────────────────────────────────────────
# Preserve VRAM across sleep states
- name: Enable NVIDIA suspend/hibernate/resume services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
  loop:
    - nvidia-suspend.service
    - nvidia-hibernate.service
    - nvidia-resume.service
  become: yes

# ── Remove splash from kernel command line ─────────────────────
- name: Remove splash from limine kernel parameters
  ansible.builtin.replace:
    path: /etc/default/limine
    regexp: '\bsplash\b\s*'
    replace: ''
  notify: Regenerate Limine boot entries
  become: yes

# ── DRM Kernel Mode Setting ─────────────────────────────────────
# Enable DRM KMS as a kernel parameter for earliest possible init.
# chwd already sets this via modprobe.d, but the kernel param
# ensures it takes effect before any modprobe config is read.
- name: Check if nvidia-drm.modeset param already set
  ansible.builtin.shell: grep -q 'nvidia-drm.modeset=1' /etc/default/limine
  register: drm_modeset_check
  changed_when: false
  failed_when: false
  become: yes

- name: Append nvidia-drm.modeset=1 kernel parameter
  ansible.builtin.lineinfile:
    path: /etc/default/limine
    insertafter: '^KERNEL_CMDLINE\[default\]'
    line: 'KERNEL_CMDLINE[default]+=" nvidia-drm.modeset=1"'
  when: drm_modeset_check.rc != 0
  notify: Regenerate Limine boot entries
  become: yes

# ── VRAM preservation ────────────────────────────────────────────
# Tell the driver to save VRAM contents to system RAM before sleeping
- name: Check if NVIDIA VRAM preservation param already set
  ansible.builtin.shell: grep -q 'nvidia.NVreg_PreserveVideoMemoryAllocations=1' /etc/default/limine
  register: nvidia_param_check
  changed_when: false
  failed_when: false
  become: yes

- name: Append NVIDIA VRAM preservation kernel parameter
  ansible.builtin.lineinfile:
    path: /etc/default/limine
    insertafter: '^KERNEL_CMDLINE\[default\]'
    line: 'KERNEL_CMDLINE[default]+=" nvidia.NVreg_PreserveVideoMemoryAllocations=1"'
  when: nvidia_param_check.rc != 0
  notify: Regenerate Limine boot entries
  become: yes
