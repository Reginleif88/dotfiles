---
# ── Core components ───────────────────────────────────────────────

- name: Install Hyprland and components
  community.general.pacman:
    name:
      - hyprland
      - hyprpolkitagent
      - hyprpaper
      - mako
      - hyprlauncher
      - xdg-desktop-portal-hyprland
      - thunar
      - thunar-volman
      - thunar-archive-plugin
      - thunar-media-tags-plugin
      - tumbler
      - ffmpegthumbnailer
      - xarchiver
      - gvfs
      - gvfs-mtp
      - udisks2
      - nwg-displays
      - loupe
      - qt6-webengine
      - pwvucontrol
      - helvum
      - pavucontrol
    state: present
  become: yes

# ── AUR packages ─────────────────────────────────────────────────

- name: Install components from AUR
  kewlfft.aur.aur:
    name:
      - quickshell-git
      - grimblast-git
      - cliphist
      - wl-clipboard
      - gruvbox-material-gtk-theme-git
      - hyprsettings-git
    use: paru
    state: present
  become: no

# ── GTK theme (dconf) ─────────────────────────────────────────────

- name: Set GTK theme in dconf
  ansible.builtin.command: gsettings set org.gnome.desktop.interface gtk-theme 'Gruvbox-Material-Dark'
  become: no
  changed_when: false

# ── Plugins ──────────────────────────────────────────────────────
# hyprpm requires a running Hyprland session, so plugin setup is handled by
# ~/.config/hypr/hyprpm-setup.sh (exec-once) on first boot.

# ── Walker (application launcher) ────────────────────────────────

- name: Remove conflicting elephant packages
  community.general.pacman:
    name:
      - elephant
      - elephant-bin
    state: absent
    force: yes
  become: yes
  ignore_errors: yes

- name: Install elephant-all-bin (Walker dependency)
  kewlfft.aur.aur:
    name:
      - elephant-all-bin
    use: paru
    state: present
  become: no

- name: Install Walker
  kewlfft.aur.aur:
    name:
      - walker-bin
    use: paru
    state: present
  become: no

# ── Elephant (data provider for Walker) ────────────────────────────

- name: Install elephant-bin
  kewlfft.aur.aur:
    name:
      - elephant-bin
    use: paru
    state: present
  become: no
